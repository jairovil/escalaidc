<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
<title>Login | Voluntários Igreja da Criança</title>
<!-- Firebase SDKs -->
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
    }
    body {
        background: linear-gradient(135deg, #0f172a 0%, #1e1b4b 100%);
        font-family: 'Segoe UI', Arial, sans-serif;
        min-height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
    }
    .login-container {
        background: #1e293b;
        padding: 40px;
        border-radius: 24px;
        width: 90%;
        max-width: 420px;
        text-align: center;
        border: 1px solid #22c55e;
        box-shadow: 0 20px 40px rgba(0,0,0,0.3);
    }
    .login-container h2 {
        color: #facc15;
        margin-bottom: 10px;
        font-size: 26px;
    }
    .login-container .sub {
        color: #94a3b8;
        font-size: 14px;
        margin-bottom: 30px;
    }
    .google-btn {
        width: 100%;
        padding: 14px;
        background: white;
        border: none;
        border-radius: 12px;
        color: #333;
        font-weight: bold;
        font-size: 16px;
        cursor: pointer;
        margin-top: 10px;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 12px;
        transition: all 0.2s;
    }
    .google-btn:hover {
        transform: scale(0.98);
        background: #f0f0f0;
    }
    .google-btn img {
        width: 22px;
        height: 22px;
    }
    .error {
        color: #ef4444;
        margin-top: 15px;
        font-size: 14px;
    }
    .info {
        color: #5b6e8c;
        font-size: 12px;
        margin-top: 25px;
        padding-top: 20px;
        border-top: 1px solid #334155;
    }
    .versiculo {
        color: #86efac;
        font-size: 12px;
        margin-top: 20px;
        font-style: italic;
    }
    .loading {
        display: none;
        color: #facc15;
        margin-top: 15px;
        font-size: 13px;
    }
</style>
</head>
<body>
<div class="login-container">
    <h2>🙌 Igreja da Criança PIBV</h2>
    <div class="sub">Área de Voluntários</div>
    
    <button class="google-btn" onclick="loginComGoogle()">
        <img src="https://www.google.com/favicon.ico" alt="Google">
        Entrar com Google
    </button>
    
    <div class="loading" id="loading">⏳ Autenticando...</div>
    <div id="mensagem" class="error"></div>
    
    <div class="info">
        🔒 Login seguro com sua conta Google<br>
        📌 Apenas e-mails autorizados podem acessar
    </div>
    <div class="versiculo">
        🌿 "Cada um sirva conforme o dom que recebeu" - 1 Pedro 4:10
    </div>
</div>

<script>
    // ==================== CONFIGURAÇÃO DO FIREBASE ====================
    const firebaseConfig = {
        apiKey: "AIzaSyDSsIYqwWIPlxhiJnw0q_YnXCwOW2uNcqU",
        authDomain: "appigreja-3cffa.firebaseapp.com",
        projectId: "appigreja-3cffa",
        storageBucket: "appigreja-3cffa.firebasestorage.app",
        messagingSenderId: "984798074954",
        appId: "1:984798074954:web:44bceded9219b1e4242eb3"
    };
    
    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    
    // ==================== E-MAIL DO ADMIN ====================
    const EMAIL_ADMIN = "jairovilatur@gmail.com";
    
    // E-MAILS AUTORIZADOS PADRÃO
    const EMAILS_PADRAO = [
        "jairovilatur@gmail.com",
        "kelly@gmail.com",
        "maria@gmail.com",
        "joao@gmail.com",
        "ana@gmail.com",
        "paulo@gmail.com"
    ];
    
    // INICIALIZAR LISTA DE E-MAILS AUTORIZADOS
    let emailsPermitidos = JSON.parse(localStorage.getItem("emails_autorizados"));
    
    if (!emailsPermitidos || emailsPermitidos.length === 0) {
        emailsPermitidos = EMAILS_PADRAO;
        localStorage.setItem("emails_autorizados", JSON.stringify(emailsPermitidos));
    }
    
    function isEmailPermitido(email) {
        const salvos = JSON.parse(localStorage.getItem("emails_autorizados")) || [];
        if (salvos.includes(email)) return true;
        if (EMAILS_PADRAO.includes(email)) return true;
        return false;
    }
    
    function loginComGoogle() {
        const provider = new firebase.auth.GoogleAuthProvider();
        provider.setCustomParameters({
            prompt: 'select_account'
        });
        
        document.getElementById("loading").style.display = "block";
        document.getElementById("mensagem").innerHTML = "";
        
        auth.signInWithPopup(provider)
            .then((result) => {
                const email = result.user.email;
                const nome = result.user.displayName || email.split('@')[0];
                const foto = result.user.photoURL || "";
                
                if (isEmailPermitido(email)) {
                    sessionStorage.clear();
                    
                    sessionStorage.setItem("logado", "true");
                    sessionStorage.setItem("usuario", email);
                    sessionStorage.setItem("usuarioNome", nome);
                    sessionStorage.setItem("usuarioFoto", foto);
                    sessionStorage.setItem("usuarioEmail", email);
                    
                    if (email === EMAIL_ADMIN) {
                        sessionStorage.setItem("usuarioRole", "admin");
                    } else {
                        sessionStorage.setItem("usuarioRole", "user");
                    }
                    
                    localStorage.setItem("ultimoUsuario", email);
                    localStorage.setItem("ultimoUsuarioRole", email === EMAIL_ADMIN ? "admin" : "user");
                    
                    window.location.href = "index.html";
                } else {
                    document.getElementById("mensagem").innerHTML = "❌ Este e-mail não tem permissão de acesso!";
                    document.getElementById("loading").style.display = "none";
                    auth.signOut();
                }
            })
            .catch((error) => {
                document.getElementById("mensagem").innerHTML = "❌ " + error.message;
                document.getElementById("loading").style.display = "none";
            });
    }
    
    if (sessionStorage.getItem("logado") === "true") {
        window.location.href = "index.html";
    }
</script>
</body>
</html>
