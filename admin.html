<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
<title>Admin | Gerenciar Usuários e Membros</title>
<!-- Firebase SDKs -->
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
    }
    body {
        background: #0f172a;
        font-family: 'Segoe UI', Arial, sans-serif;
        color: white;
    }
    header {
        background: #020617;
        padding: 15px;
        text-align: center;
        font-size: 18px;
        font-weight: bold;
        border-bottom: 2px solid #22c55e;
        display: flex;
        justify-content: space-between;
        align-items: center;
        flex-wrap: wrap;
        gap: 10px;
    }
    .container {
        padding: 20px;
        max-width: 900px;
        margin: auto;
    }
    .card {
        background: #1e293b;
        padding: 20px;
        margin-bottom: 20px;
        border-radius: 12px;
    }
    .card h3 {
        margin-bottom: 15px;
        border-left: 3px solid #22c55e;
        padding-left: 10px;
    }
    input, select {
        width: 100%;
        padding: 12px;
        margin: 8px 0;
        border-radius: 8px;
        border: none;
        background: #0f172a;
        color: white;
        border: 1px solid #334155;
    }
    button {
        padding: 10px 20px;
        background: #22c55e;
        border: none;
        border-radius: 8px;
        color: white;
        font-weight: bold;
        cursor: pointer;
        margin-top: 10px;
    }
    button:hover {
        background: #16a34a;
    }
    .btn-voltar {
        background: #facc15;
        color: #0f172a;
    }
    .email-item {
        background: #0f172a;
        padding: 8px 15px;
        border-radius: 20px;
        display: inline-flex;
        align-items: center;
        gap: 10px;
        margin: 5px;
    }
    .membro-item {
        background: #0f172a;
        padding: 8px 15px;
        border-radius: 20px;
        display: inline-flex;
        align-items: center;
        gap: 10px;
        margin: 5px;
    }
    .toast {
        position: fixed;
        bottom: 20px;
        left: 50%;
        transform: translateX(-50%);
        background: #1e293b;
        color: white;
        padding: 8px 16px;
        border-radius: 30px;
        font-size: 0.75rem;
        z-index: 1000;
        animation: fadeOut 2.5s ease forwards;
        border-left: 3px solid #22c55e;
    }
    @keyframes fadeOut {
        0% { opacity: 0; transform: translateX(-50%) translateY(10px); }
        15% { opacity: 1; transform: translateX(-50%) translateY(0); }
        85% { opacity: 1; }
        100% { opacity: 0; visibility: hidden; }
    }
    @media (max-width: 700px) {
        .container { padding: 12px; }
    }
</style>
</head>
<body>

<header>
    <span>👑 Painel do Administrador</span>
    <div>
        <button class="btn-voltar" onclick="window.location.href='index.html'">◀ Voltar ao Sistema</button>
        <button onclick="logout()" style="background:#ef4444; margin-left:10px;">🚪 Sair</button>
    </div>
</header>

<div class="container">
    <div class="card">
        <h3>📧 Gerenciar E-mails Autorizados</h3>
        <div style="display: flex; gap: 10px; flex-wrap: wrap;">
            <input type="email" id="novoEmail" placeholder="E-mail do usuário" style="flex: 2;">
            <input type="text" id="nomeUsuario" placeholder="Nome do usuário" style="flex: 2;">
            <button onclick="adicionarEmailAutorizado()" style="width: auto; padding: 10px 20px;">➕ Adicionar</button>
        </div>
        <div id="listaEmails" style="margin-top: 15px;"></div>
        <div style="font-size: 12px; color: #94a3b8; margin-top: 10px;">
            💡 Seu e-mail <strong>jairovilatur@gmail.com</strong> é o ADMIN
        </div>
    </div>

    <div class="card">
        <h3>👥 Gerenciar Membros</h3>
        <div style="display: flex; gap: 10px; flex-wrap: wrap;">
            <input type="text" id="novoMembro" placeholder="Nome do membro" style="flex: 2;">
            <button onclick="adicionarMembro()" style="width: auto; padding: 10px 20px;">➕ Adicionar</button>
        </div>
        <div id="listaMembros" style="margin-top: 15px;"></div>
    </div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyDSsIYqwWIPlxhiJnw0q_YnXCwOW2uNcqU",
        authDomain: "appigreja-3cffa.firebaseapp.com",
        projectId: "appigreja-3cffa",
        storageBucket: "appigreja-3cffa.firebasestorage.app",
        messagingSenderId: "984798074954",
        appId: "1:984798074954:web:44bceded9219b1e4242eb3"
    };
    
    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    
    const EMAIL_ADMIN = "jairovilatur@gmail.com";
    const EMAILS_PADRAO = ["jairovilatur@gmail.com", "kelly@gmail.com", "maria@gmail.com", "joao@gmail.com"];
    
    auth.onAuthStateChanged((user) => {
        if (!user || user.email !== EMAIL_ADMIN) {
            alert("⚠️ Acesso negado! Apenas o administrador pode acessar.");
            window.location.href = "index.html";
        }
    });
    
    let emailsPermitidos = JSON.parse(localStorage.getItem("emails_autorizados"));
    if (!emailsPermitidos || emailsPermitidos.length === 0) {
        emailsPermitidos = EMAILS_PADRAO;
        localStorage.setItem("emails_autorizados", JSON.stringify(emailsPermitidos));
    }
    
    function carregarEmailsAutorizados() {
        const emails = JSON.parse(localStorage.getItem("emails_autorizados")) || [];
        const container = document.getElementById("listaEmails");
        if (emails.length === 0) {
            container.innerHTML = '<div style="color:#94a3b8;">Nenhum e-mail autorizado</div>';
            return;
        }
        let html = '<div style="display: flex; flex-wrap: wrap; gap: 8px;">';
        emails.forEach((email, index) => {
            const isAdmin = (email === EMAIL_ADMIN);
            html += `<div class="email-item"><span>📧 ${email}</span>${!isAdmin ? `<button onclick="removerEmail(${index})" style="background:#ef4444; padding:2px 8px; width:auto; font-size:10px;">✖</button>` : '<span style="color:#facc15;">👑 ADMIN</span>'}</div>`;
        });
        html += '</div>';
        container.innerHTML = html;
    }
    
    function adicionarEmailAutorizado() {
        const novoEmail = document.getElementById("novoEmail").value.trim();
        const nomeUsuario = document.getElementById("nomeUsuario").value.trim();
        if (!novoEmail) { showToast("❌ Digite um e-mail!", "erro"); return; }
        
        let emails = JSON.parse(localStorage.getItem("emails_autorizados")) || [];
        if (emails.includes(novoEmail)) { showToast("❌ E-mail já autorizado!", "erro"); return; }
        
        emails.push(novoEmail);
        localStorage.setItem("emails_autorizados", JSON.stringify(emails));
        
        let membros = JSON.parse(localStorage.getItem("membros_lista")) || [];
        const nomeFinal = nomeUsuario || novoEmail.split('@')[0];
        if (!membros.includes(nomeFinal)) {
            membros.push(nomeFinal);
            localStorage.setItem("membros_lista", JSON.stringify(membros));
            carregarMembros();
        }
        
        document.getElementById("novoEmail").value = "";
        document.getElementById("nomeUsuario").value = "";
        carregarEmailsAutorizados();
        showToast(`✅ ${novoEmail} autorizado!`, "sucesso");
    }
    
    function removerEmail(index) {
        let emails = JSON.parse(localStorage.getItem("emails_autorizados")) || [];
        if (emails[index] === EMAIL_ADMIN) { showToast("❌ Não pode remover o admin!", "erro"); return; }
        emails.splice(index, 1);
        localStorage.setItem("emails_autorizados", JSON.stringify(emails));
        carregarEmailsAutorizados();
        showToast(`❌ E-mail removido!`, "sucesso");
    }
    
    let membros = JSON.parse(localStorage.getItem("membros_lista")) || ["Kelly", "Jairo", "Maria", "João", "Ana", "Paulo", "Carla", "Roberto"];
    
    function carregarMembros() {
        membros = JSON.parse(localStorage.getItem("membros_lista")) || [];
        const container = document.getElementById("listaMembros");
        if (membros.length === 0) { container.innerHTML = '<div style="color:#94a3b8;">Nenhum membro</div>'; return; }
        let html = '<div style="display: flex; flex-wrap: wrap; gap: 8px;">';
        membros.forEach((membro, index) => {
            html += `<div class="membro-item"><span>👤 ${membro}</span><button onclick="removerMembro(${index})" style="background:#ef4444; padding:2px 8px; width:auto; font-size:10px;">✖</button></div>`;
        });
        html += '</div>';
        container.innerHTML = html;
    }
    
    function adicionarMembro() {
        const novoMembro = document.getElementById("novoMembro").value.trim();
        if (!novoMembro) { showToast("❌ Digite um nome!", "erro"); return; }
        if (membros.includes(novoMembro)) { showToast("❌ Já existe!", "erro"); return; }
        membros.push(novoMembro);
        localStorage.setItem("membros_lista", JSON.stringify(membros));
        document.getElementById("novoMembro").value = "";
        carregarMembros();
        showToast(`✅ ${novoMembro} adicionado!`, "sucesso");
    }
    
    function removerMembro(index) {
        const removido = membros[index];
        membros.splice(index, 1);
        localStorage.setItem("membros_lista", JSON.stringify(membros));
        carregarMembros();
        showToast(`❌ ${removido} removido!`, "sucesso");
    }
    
    function showToast(msg, tipo) {
        let toast = document.querySelector(".toast");
        if (toast) toast.remove();
        toast = document.createElement("div");
        toast.className = "toast";
        toast.style.borderLeftColor = tipo === "erro" ? "#ef4444" : "#22c55e";
        toast.textContent = msg;
        document.body.appendChild(toast);
        setTimeout(() => toast.remove(), 2500);
    }
    
    function logout() {
        auth.signOut().then(() => { sessionStorage.clear(); window.location.href = "login.html"; });
    }
    
    carregarEmailsAutorizados();
    carregarMembros();
</script>
</body>
</html>
